name: Secret Scanning

# 防止 API key / 密钥等敏感信息被误提交到仓库。
# 失败会阻塞该次 push/PR（红 X），需要清除敏感信息后重新提交。
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 拉取全部提交历史，便于扫描所有变更
          fetch-depth: 0

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          # 使用 gitleaks 默认规则集（覆盖 Google / AWS / GitHub / 通用 API key 等几十种格式）
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 如果 Gitleaks 扫到密钥，直接 fail。要合法保留的占位符，用 # gitleaks:allow 行内注释豁免
          GITLEAKS_ENABLE_COMMENTS: true
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false
          GITLEAKS_CONFIG: .gitleaks.toml
